name: tiny_meds
description: "A production-ready Flutter Android application for home medicine inventory management and alerts."
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: ^3.5.0

dependencies:
  camera: ^0.11.0
  csv: 6.0.0
  cupertino_icons: ^1.0.8
  drift: ^2.19.1
  file_picker: 8.3.3
  flutter:
    sdk: flutter
  flutter_file_dialog: ^3.0.3
  flutter_local_notifications: ^17.2.1+2
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  google_mlkit_text_recognition: ^0.13.0
  intl: ^0.19.0
  path: ^1.9.0
  path_provider: ^2.1.4
  riverpod_annotation: ^2.3.5
  share_plus: ^12.0.2
  shared_preferences: ^2.5.5
  sqlite3_flutter_libs: ^0.5.24
  timezone: ^0.9.4
  workmanager: ^0.9.0

dev_dependencies:
  build_runner: ^2.4.12
  drift_dev: ^2.19.1
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mockito: ^5.4.4
  riverpod_generator: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
