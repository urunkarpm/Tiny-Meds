name: tiny_meds
description: "A production-ready Flutter Android application for home medicine inventory management and alerts."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Local Database
  drift: ^2.19.1
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  
  # Notifications
  flutter_local_notifications: ^17.2.1+2
  workmanager: ^0.9.0
  timezone: ^0.9.4
  
  # Security
  flutter_secure_storage: ^9.2.2
  
  # Date and Time
  intl: ^0.19.0
  
  # UI Components
  cupertino_icons: ^1.0.8
  
  # Optional OCR (commented out for base build)
  # camera: ^0.11.0
  # google_mlkit_text_recognition: ^0.13.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  drift_dev: ^2.19.1
  riverpod_generator: ^2.4.3
  mockito: ^5.4.4
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
